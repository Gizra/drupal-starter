server_ai_content.generate:
  path: '/node/add/{node_type}/ai-generate'
  defaults:
    _form: '\Drupal\server_ai_content\Form\AiContentGenerateForm'
    _title: 'AI Content Generator'
  requirements:
    _permission: 'generate ai content'
  options:
    _admin_route: TRUE
    parameters:
      node_type:
        type: entity:node_type
