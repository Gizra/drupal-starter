langcode: en
status: true
dependencies:
  config:
    - field.storage.node.field_body
    - field.storage.node.field_tags
    - search_api.server.rag_pinecone
  module:
    - node
    - taxonomy
id: rag_news
name: 'RAG News'
description: 'POC: embeds news nodes into Pinecone via ai_search.'
read_only: false
field_settings:
  field_body:
    label: Body
    datasource_id: 'entity:node'
    property_path: field_body
    type: text
    dependencies:
      config:
        - field.storage.node.field_body
  field_tags:
    label: Tags
    datasource_id: 'entity:node'
    property_path: 'field_tags:entity:name'
    type: text
    dependencies:
      config:
        - field.storage.node.field_tags
      module:
        - taxonomy
  nid:
    label: 'Node ID'
    datasource_id: 'entity:node'
    property_path: nid
    type: integer
    dependencies:
      module:
        - node
  status:
    label: Published
    datasource_id: 'entity:node'
    property_path: status
    type: boolean
    dependencies:
      module:
        - node
  title:
    label: Title
    datasource_id: 'entity:node'
    property_path: title
    type: text
    dependencies:
      module:
        - node
  uid:
    label: 'Entity reference'
    datasource_id: 'entity:node'
    property_path: uid
    type: integer
    dependencies:
      module:
        - node
  uuid:
    label: UUID
    datasource_id: 'entity:node'
    property_path: uuid
    type: string
    dependencies:
      module:
        - node
datasource_settings:
  'entity:node':
    bundles:
      default: false
      selected:
        - news
    languages:
      default: true
      selected: {  }
processor_settings:
  add_url: {  }
  aggregated_field: {  }
  custom_value: {  }
  entity_type: {  }
  language_with_fallback: {  }
  rendered_item: {  }
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  delete_on_fail: true
  index_directly: false
  track_changes_in_references: true
server: rag_pinecone
